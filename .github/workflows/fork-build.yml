name: Fork Build

# Fork-only workflow: builds the patched rari binary on GitHub-hosted runners and
# publishes a prerelease on this fork's Releases page with the platform binaries
# and npm tarballs attached. Does NOT npm-publish and does NOT touch the upstream
# release.yml (which targets self-hosted runners this fork does not have).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease version for the packed npm tarballs (semver)'
        required: true
        default: '0.14.13-cachefix.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: rari-linux-x64
          - platform: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
            name: rari-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list pkg-config &>/dev/null || brew install pkg-config
          brew list fontconfig &>/dev/null || brew install fontconfig

      - name: Build binary
        run: |
          mkdir -p crates/rari/snapshots
          touch crates/rari/snapshots/RARI_SNAPSHOT.bin
          echo 'pub static RESIDUAL_LAZY_ESM_SOURCES: &[(&str, &str)] = &[];' > crates/rari/snapshots/residual_lazy_sources.rs
          echo 'pub static RESIDUAL_LAZY_JS_SOURCES: &[(&str, &str)] = &[];' >> crates/rari/snapshots/residual_lazy_sources.rs
          cargo run --release --manifest-path tools/snapshot/Cargo.toml -- crates/rari/snapshots
          cargo build --release --target ${{ matrix.target }} --bin rari

      - name: Prepare binary
        run: |
          mkdir -p binaries
          cp target/${{ matrix.target }}/release/rari binaries/${{ matrix.name }}
          chmod +x binaries/${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: binaries/${{ matrix.name }}

  release:
    name: Package and publish prerelease
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build platform npm tarballs
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          mkdir -p dist-tarballs

          build_platform() {
            local platform="$1" os="$2" cpu="$3" desc="$4" keywords="$5"
            local pkg="rari-${platform}"
            local dir="packages/${pkg}"
            mkdir -p "${dir}/bin"
            cp "artifacts/${pkg}/${pkg}" "${dir}/bin/rari"
            chmod +x "${dir}/bin/rari"
            cp .github/templates/package.json.platform "${dir}/package.json"
            sed -i "s|{NAME}|${pkg}|g" "${dir}/package.json"
            sed -i "s|{VERSION}|${VERSION}|g" "${dir}/package.json"
            sed -i "s|{DESCRIPTION}|${desc}|g" "${dir}/package.json"
            sed -i "s|{OS}|${os}|g" "${dir}/package.json"
            sed -i "s|{CPU}|${cpu}|g" "${dir}/package.json"
            sed -i "s|{KEYWORDS}|${keywords}|g" "${dir}/package.json"
            sed -i "s|{BIN_PATH}|./bin/rari|g" "${dir}/package.json"
            sed -i "s|{BIN_FILE}|bin/rari|g" "${dir}/package.json"
            cp LICENSE "${dir}/LICENSE"
            echo "# ${pkg}" > "${dir}/README.md"
            (cd "${dir}" && npm pkg fix && npm pack --pack-destination "${GITHUB_WORKSPACE}/dist-tarballs")
          }

          build_platform linux-x64  linux  x64   "Linux x64 binary"   '"linux", "x64",'
          build_platform darwin-arm64 darwin arm64 "macOS ARM64 binary" '"darwin", "arm64", "macos", "apple-silicon",'

          ls -la dist-tarballs

      - name: Build rari JS tarball
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          pnpm install --frozen-lockfile
          pnpm --filter "rari..." build
          # Bump version and align optionalDependencies to the prerelease version.
          node --input-type=module -e "
            import { readFileSync, writeFileSync } from 'node:fs';
            const f = 'packages/rari/package.json';
            const p = JSON.parse(readFileSync(f, 'utf8'));
            p.version = '${VERSION}';
            for (const k of Object.keys(p.optionalDependencies ?? {})) p.optionalDependencies[k] = '${VERSION}';
            writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
          "
          (cd packages/rari && cp "${GITHUB_WORKSPACE}/LICENSE" LICENSE && pnpm pack --pack-destination "${GITHUB_WORKSPACE}/dist-tarballs")
          ls -la dist-tarballs

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TAG="build-${VERSION}"
          NOTES_FILE="$(mktemp)"
          cat > "${NOTES_FILE}" <<EOF
          Patched rari build (Cache-Control on static/synchronous render paths) for hand-off.

          Platforms: \`darwin-arm64\`, \`linux-x64\`. npm tarballs are version \`${VERSION}\`.

          ## Install (in the consuming project)

          Install the JS package and the matching platform binary package from the asset URLs below, e.g. on Apple Silicon:

          \`\`\`sh
          npm install <rari-${VERSION}.tgz URL> <rari-darwin-arm64-${VERSION}.tgz URL>
          \`\`\`

          On Linux x64 use the \`rari-linux-x64-${VERSION}.tgz\` asset instead. Raw binaries are also attached.
          EOF

          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "rari ${VERSION} (cache-control fix)" \
            --notes-file "${NOTES_FILE}" \
            --prerelease \
            --target "${GITHUB_SHA}" \
            dist-tarballs/*.tgz \
            artifacts/rari-linux-x64/rari-linux-x64 \
            artifacts/rari-darwin-arm64/rari-darwin-arm64
